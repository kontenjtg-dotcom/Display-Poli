<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Poli</title>
    <style>
        :root {
            --buka: #27ae60;
            --tutup: #c0392b;
            --bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            padding: 5px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Menghilangkan scroll agar pas satu layar */
        }

        header {
            text-align: center;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }

        h2 { font-size: 1rem; margin-bottom: 5px; }

        /* Tombol Bulk Action */
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .btn {
            padding: 5px 12px;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-buka { background-color: var(--buka); }
        .btn-tutup { background-color: var(--tutup); }

        /* Grid 2 Kolom agar muat banyak */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            flex-grow: 1;
        }

        .card {
            background: #f9f9f9;
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid var(--tutup);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .card.is-buka { border-left-color: var(--buka); background: #f0fff4; }

        .name { 
            font-size: 0.65rem; /* Font kecil agar muat 2 kolom */
            font-weight: 600; 
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70px;
        }

        /* Switch Mini */
        .switch {
            position: relative;
            display: inline-block;
            width: 30px;
            height: 16px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .2s;
            border-radius: 16px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px; width: 12px;
            left: 2px; bottom: 2px;
            background-color: white;
            transition: .2s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--buka); }
        input:checked + .slider:before { transform: translateX(14px); }

        .status-label {
            font-size: 0.6rem;
            font-weight: bold;
            margin-right: 4px;
            color: var(--tutup);
        }

        input:checked ~ .status-label { color: var(--buka); }
    </style>
</head>
<body>

    <header>
        <h2>Status Operasional Poli</h2>
        <div class="controls">
            <button class="btn btn-buka" onclick="bulkToggle(true)">BUKA SEMUA</button>
            <button class="btn btn-tutup" onclick="bulkToggle(false)">TUTUP SEMUA</button>
        </div>
    </header>

    <div class="grid-container" id="main-list"></div>

    <script>
        const daftarPoli = [
            "Usia Dewasa", "Lanjut Usia", "Sekolah/Remaja",
            "Balita/PraSek", "Layanan Gigi", "Ibu Hamil",
            "Ibu Nifas", "KB", "IVA", "IMS", "Pelangi", "Metadon",
            "Imunisasi", "Layanan Sore", "Layanan 24 Jam", "Tindakan",
            "R. Bersalin", "MCU", "Kes. Haji", "TB (DOTS)",
            "Layanan Gizi", "Keswa", "Kespro Catin", "EKG", "Psikologi"
        ];

        const listWrap = document.getElementById('main-list');

        // Render List
        daftarPoli.forEach((poli, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.id = `card-${i}`;
            div.innerHTML = `
                <div class="name">${poli}</div>
                <div style="display:flex; align-items:center">
                    <span class="status-label" id="text-${i}">TUTUP</span>
                    <label class="switch">
                        <input type="checkbox" class="poli-checkbox" id="check-${i}" onchange="togglePoli(${i}, this)">
                        <span class="slider"></span>
                    </label>
                </div>
            `;
            listWrap.appendChild(div);
        });

        // Toggle Satuan
        function togglePoli(id, el) {
            const card = document.getElementById(`card-${id}`);
            const txt = document.getElementById(`text-${id}`);
            if(el.checked) {
                card.classList.add('is-buka');
                txt.innerText = "BUKA";
            } else {
                card.classList.remove('is-buka');
                txt.innerText = "TUTUP";
            }
        }

        // Fitur Buka/Tutup Semua
        function bulkToggle(status) {
            const checkboxes = document.querySelectorAll('.poli-checkbox');
            checkboxes.forEach((cb, i) => {
                cb.checked = status;
                togglePoli(i, cb);
            });
        }
    </script>
</body>
</html>
