<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Poli</title>
    <style>
        :root {
            --buka: #27ae60;
            --tutup: #c0392b;
            --bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg);
            padding: 5px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        header {
            text-align: center;
            padding-bottom: 5px;
            flex-shrink: 0;
            border-bottom: 1px solid #eee;
        }

        h2 { font-size: 0.95rem; color: #333; margin-bottom: 5px; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-buka { background-color: var(--buka); }
        .btn-tutup { background-color: var(--tutup); }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-auto-rows: min-content;
            gap: 3px;
            flex-grow: 1;
        }

        .card {
            background: #fdfdfd;
            padding: 3px 5px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eee;
            border-left: 3px solid var(--tutup);
        }

        .card.is-buka { 
            border-left-color: var(--buka); 
            background: #f0fff4; 
        }

        .name { 
            font-size: 0.58rem; 
            font-weight: 700; 
            color: #444;
            line-height: 1.1;
            padding-right: 2px;
            max-width: 65%;
        }

        .switch-group {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-width: 55px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 28px;
            height: 16px;
            flex-shrink: 0;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ddd;
            transition: .2s;
            border-radius: 16px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px; width: 12px;
            left: 2px; bottom: 2px;
            background-color: white;
            transition: .2s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--buka); }
        input:checked + .slider:before { transform: translateX(12px); }

        .status-label {
            font-size: 0.5rem;
            font-weight: 800;
            margin-right: 3px;
            color: var(--tutup);
            text-align: right;
        }

        input:checked ~ .status-label { color: var(--buka); }
    </style>
</head>
<body>

    <header>
        <h2>Monitoring Status Poli</h2>
        <div class="controls">
            <button class="btn btn-buka" onclick="bulkToggle(true)">Buka Semua</button>
            <button class="btn btn-tutup" onclick="bulkToggle(false)">Tutup Semua</button>
        </div>
    </header>

    <div class="grid-container" id="main-list"></div>

    <script>
        const daftarPoli = [
            "Kesehatan Usia Dewasa", "Kesehatan Lanjut Usia", "Usia Sekolah & Remaja",
            "Balita & Pra Sekolah", "Layanan Gigi", "Kesehatan Ibu Hamil",
            "Kesehatan Ibu Nifas", "KB (Keluarga Berencana)", "IVA (Deteksi Dini)", 
            "IMS", "Pelangi", "Metadon / PTRM",
            "Anak / Imunisasi", "Layanan Sore", "Layanan 24 Jam", "Layanan Tindakan",
            "Ruang Bersalin", "Medical Check Up", "Kesehatan Haji", "TB (DOTS)",
            "Layanan Gizi", "Layanan Keswa", "Kespro Catin", "Layanan EKG", "Psikologi"
        ];

        const listWrap = document.getElementById('main-list');

        daftarPoli.forEach((poli, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.id = `card-${i}`;
            div.innerHTML = `
                <div class="name">${poli}</div>
                <div class="switch-group">
                    <span class="status-label" id="text-${i}">TUTUP</span>
                    <label class="switch">
                        <input type="checkbox" class="poli-checkbox" id="check-${i}" onchange="togglePoli(${i}, this)">
                        <span class="slider"></span>
                    </label>
                </div>
            `;
            listWrap.appendChild(div);
        });

        function togglePoli(id, el) {
            const card = document.getElementById(`card-${id}`);
            const txt = document.getElementById(`text-${id}`);
            if(el.checked) {
                card.classList.add('is-buka');
                txt.innerText = "BUKA";
            } else {
                card.classList.remove('is-buka');
                txt.innerText = "TUTUP";
            }
        }

        function bulkToggle(status) {
            const checkboxes = document.querySelectorAll('.poli-checkbox');
            checkboxes.forEach((cb, i) => {
                cb.checked = status;
                togglePoli(i, cb);
            });
        }
    </script>
</body>
</html>
